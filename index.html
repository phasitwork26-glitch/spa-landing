<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>นวดไทย & สปา</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f8f6f2;
  color: #222;
  <!-- Mobile -->
<button class="cta-mobile" onclick="openSheet()">
  ปรึกษา & จองคิว
</button>

<!-- Desktop -->
<div class="cta-desktop">
  <h4>ปรึกษา & จองคิว</h4>
  <p>เลือกวัน เวลา และบริการที่เหมาะกับคุณได้ง่าย ๆ</p>
  <button onclick="openSheet()">เริ่มต้น</button>
</div>
}

.hero {
  padding: 80px 20px 120px;
  text-align: center;
  background: linear-gradient(to bottom, #111, #333);
  color: white;
}

.hero h1 {
  font-size: 28px;
  margin: 0 0 10px;
}

.hero p {
  opacity: .8;
  font-size: 15px;
}

/* Floating Button */
/* Floating Button Default (Mobile First) */
.cta-desktop {
  position: absolute;
  top: 50%;
  right: 8%;
  transform: translateY(-50%);
  width: 380px;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  padding: 30px;
  border-radius: 24px;
  box-shadow: 0 25px 70px rgba(0,0,0,.25);
  border: 1px solid rgba(212,175,55,.3);
  display: none;
}

.cta-desktop h4 {
  font-size: 20px;
  margin: 0 0 10px;
  font-weight: 600;
}

.cta-desktop p {
  font-size: 14px;
  margin: 0 0 20px;
  opacity: .7;
  line-height: 1.6;
}

.cta-desktop button {
  width: 100%;
  padding: 14px;
  font-size: 15px;
  border: none;
  background: #d4af37;
  border-radius: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: .2s;
}

.cta-desktop button:hover {
  transform: translateY(-2px);
}

/* แสดงเฉพาะ Desktop */
@media (min-width: 768px) {
  .cta-desktop {
    display: block;
  }
  .cta-mobile {
    display: none;
  }
}
/* Bottom Sheet */
.sheet {
  position: fixed;
  bottom: -100%;
  left: 0;
  right: 0;
  background: white;
  border-radius: 20px 20px 0 0;
  padding: 25px;
  box-shadow: 0 -10px 30px rgba(0,0,0,.2);
  transition: .4s ease;
  z-index: 1001;
}

.sheet.active {
  bottom: 0;
}

.sheet h3 {
  margin-top: 0;
  text-align: center;
}

.option {
  background: #f2f2f2;
  padding: 15px;
  border-radius: 12px;
  margin: 10px 0;
  text-align: center;
  cursor: pointer;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.4);
  display: none;
  z-index: 1000;
}

.overlay.active {
  display: block;
}
</style>
</head>

<body>

<section class="hero">
  <h1>นวดไทย & สปา</h1>
  <p>ผ่อนคลายอย่างมีระดับ ดูแลตัวเองวันนี้</p>
</section>

<button class="cta-button" onclick="openSheet()">
  ปรึกษา & จองคิว
</button>

<div class="overlay" id="overlay" onclick="closeSheet()"></div>

<div class="sheet" id="sheet">
  <h3>เลือกสิ่งที่ต้องการ</h3>

  <div class="option" onclick="selectOption('booking')">
    🗓 จองคิว
  </div>

  <div class="option" onclick="selectOption('service')">
    💆 รูปแบบบริการ
  </div>

  <div class="option" onclick="selectOption('other')">
    💬 สอบถามอื่น ๆ
  </div>
</div>

<script>
function openSheet() {
  document.getElementById("sheet").classList.add("active");
  document.getElementById("overlay").classList.add("active");
}

function closeSheet() {
  document.getElementById("sheet").classList.remove("active");
  document.getElementById("overlay").classList.remove("active");
}

function selectOption(type) {
  closeSheet();
  alert("คุณเลือก: " + type);
}
</script>

</body>
</html>
